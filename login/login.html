<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ConfidMate</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-container">
    <div class="login-box glass">
      <h2>Welcome Back</h2>
      <p>Login to continue your confidence journey</p>

      <input type="email" id="email" placeholder="Enter your email" autocomplete="off">
      <input type="password" id="password" placeholder="Enter your password" autocomplete="off">

      <button id="loginBtn" class="primary-btn">Login</button>
      <button id="signupBtn" class="secondary-btn">Create Account</button>
      <button id="googleBtn" class="google-btn">Continue with Google</button>

      <p id="authMessage"></p>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
